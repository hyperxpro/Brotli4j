      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        env:
          cache-name: cache-m2-repository-${{ runner.os }}-jdk8-aarch64
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-pr-${{ env.cache-name }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-pr-${{ env.cache-name }}-
            ${{ runner.os }}-pr-
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: uraimo/run-on-arch-action@v3.1.0
        name: Run commands
        id: runcmd
        with:
          arch: none
          distro: none
          base_image: --platform=linux/arm64/v8 ghcr.io/hyperxpro/brotli4j-ci:aarch64-centos7-jdk8

          dockerRunArgs: |
            --volume "/home/runner/.m2/repository/:/root/.m2/repository"

          run: |
            chmod +x ./mvnw
            ./mvnw -B --show-version -ntp clean package

      - name: Upload the build
        uses: actions/upload-artifact@v7
        with:
          name: Linux-Aarch64-Build-JDK8
          path: /home/runner/work/Brotli4j/

