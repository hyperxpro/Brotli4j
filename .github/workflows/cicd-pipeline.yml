name: Brotli4j CI/CD and Release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      name:
        description: 'Github Actions'
        required: true
        default: 'Github Actions'
      do_release:
        description: 'Release to Maven Central'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:

  MacOS-x86_64-Build-JDK8:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: 8
      - name: Build with Maven
        run: mvn -B --show-version -ntp clean package --file pom.xml
      - name: Upload the build
        uses: actions/upload-artifact@v7
        with:
          name: MacOS-x86_64-Build-JDK8
          path: /Users/runner/work/Brotli4j/

  MacOS-x86_64-Build-JDK11:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: 11
      - name: Build with Maven
        run: mvn -B --show-version -ntp --file pom.xml clean package

  MacOS-x86_64-Build-JDK17:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: 17
      - name: Build with Maven
        run: mvn -B --show-version -ntp --file pom.xml clean package

  MacOS-x86_64-Build-JDK21:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: 21
      - name: Build with Maven
        run: mvn -B --show-version -ntp --file pom.xml clean package

  Linux-x86_64-Build-JDK8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build in prebuilt CentOS 6 container
        run: |
          IMAGE=ghcr.io/hyperxpro/brotli4j-ci:x86_64-centos6-jdk8
          docker pull "$IMAGE"
          docker run --rm \
            -v "${{ github.workspace }}:/code" \
            -v "${HOME}/.m2:/root/.m2" \
            -w /code \
            "$IMAGE" \
            mvn -B --show-version -ntp clean package --file pom.xml
      - name: Upload the build
        uses: actions/upload-artifact@v7
        with:
          name: Linux-x86_64-Build-JDK8
          path: /home/runner/work/Brotli4j/

  Linux-x86_64-Build-JDK11:
